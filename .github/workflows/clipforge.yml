name: ClipForge Pipeline

on:
  schedule:
    - cron: '0 3,9,15 * * *'
  workflow_dispatch:
    inputs:
      force_full_report:
        description: 'Force full report even if no new packs'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq reportlab Pillow

      - name: Generate clip art packs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generator.py --count 3

      - name: Assemble packs
        run: python scripts/pack_assembler.py

      - name: Send daily report
        if: success() || (inputs.force_full_report == 'true')
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python scripts/daily_report.py

      - name: Commit and push new packs
        run: |
          git config user.name "clipforge-bot"
          git config user.email "bot@clipforge.local"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: generate clip art packs - ${TIMESTAMP}"
            git push
          fi
