name: ClipForge Pipeline

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of packs to generate'
        required: false
        default: '1'
        type: string

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq reportlab Pillow requests python-dotenv

      - name: Run full pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          AIHORDE_API_KEY: ${{ secrets.AIHORDE_API_KEY }}
        run: python full_pipeline.py --count ${{ inputs.count || '1' }}

      - name: Commit and push new packs
        run: |
          git config user.name "clipforge-bot"
          git config user.email "bot@clipforge.local"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: generate clip art packs - ${TIMESTAMP}"
            git push
          fi
